<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Türkiye Sismik Isı Haritası — Canlı Akış</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#111;color:#ccc;display:flex;flex-direction:column;height:100vh}
    #map{flex:1}

    /* ── PANEL ── */
    .panel{background:#1c1c1c;border-top:1px solid #2a2a2a;padding:10px 18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}

    .ctrl{display:flex;align-items:center;gap:7px;font-size:.83rem}
    .ctrl label{color:#888;white-space:nowrap}
    .ctrl input[type=range]{width:110px;accent-color:#06b6d4;cursor:pointer}
    .ctrl span{color:#06b6d4;font-weight:700;min-width:20px;text-align:right}

    .sep{width:1px;height:26px;background:#2a2a2a;flex-shrink:0}

    .tbtn{padding:5px 11px;border-radius:5px;border:1px solid #333;background:transparent;color:#888;font-size:.8rem;cursor:pointer;transition:all .12s}
    .tbtn:hover{border-color:#06b6d4;color:#06b6d4}
    .tbtn.active{background:#06b6d4;color:#000;border-color:#06b6d4;font-weight:700}

    .src-sel{padding:4px 8px;border-radius:5px;border:1px solid #333;background:#222;color:#bbb;font-size:.8rem;cursor:pointer}

    /* ── STATUS ── */
    .sbar{background:#141414;border-top:1px solid #222;padding:4px 18px;font-size:.76rem;color:#555;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
    .sbar b{color:#06b6d4}
    .sbar .err{color:#ef4444}
    .sbar a{color:#444;text-decoration:none}
    .sbar a:hover{color:#06b6d4}

    /* ── LIVE BADGE ── */
    .live-badge{display:inline-flex;align-items:center;gap:5px;font-size:.76rem;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid #333}
    .live-badge.on{color:#34d399;border-color:#34d399}
    .live-badge.off{color:#555;border-color:#333}
    .live-badge.on .dot{width:7px;height:7px;border-radius:50%;background:#34d399;animation:blink 1s infinite}
    .live-badge.off .dot{width:7px;height:7px;border-radius:50%;background:#555}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* ── LEGEND ── */
    .legend{position:absolute;bottom:88px;right:10px;z-index:999;background:rgba(0,0,0,.8);border:1px solid #2a2a2a;border-radius:6px;padding:9px 13px;font-size:.75rem;line-height:1.9;pointer-events:none}
    .legend-title{color:#fbbf24;font-weight:700;margin-bottom:3px;font-size:.78rem}
    .fl{display:inline-block;width:16px;height:3px;border-radius:2px;vertical-align:middle;margin-right:5px}

    /* ── NEW EQ FLASH ── */
    @keyframes flashNew{0%{opacity:1;transform:scale(1.6)}100%{opacity:.7;transform:scale(1)}}
    .new-eq{animation:flashNew .6s ease-out}
  </style>
</head>
<body>

<div id="map"></div>

<div class="legend">
  <div class="legend-title">Diri Fay Tipleri</div>
  <div><span class="fl" style="background:#f97316"></span>Doğrultu Atımlı</div>
  <div><span class="fl" style="background:#06b6d4"></span>Normal</div>
  <div><span class="fl" style="background:#ef4444"></span>Bindirme</div>
  <div><span class="fl" style="background:#666"></span>Tanımsız</div>
  <div style="margin-top:6px">
    <div class="legend-title">Isı Haritası</div>
    <div style="height:8px;border-radius:3px;background:linear-gradient(to right,#000080,#0000ff,#00ffff,#00ff00,#ffff00,#ff8800,#ff0000)"></div>
    <div style="display:flex;justify-content:space-between;color:#555;font-size:.7rem;margin-top:2px"><span>Düşük</span><span>Yüksek</span></div>
  </div>
</div>

<!-- PANEL -->
<div class="panel">
  <!-- Zaman -->
  <div style="display:flex;gap:4px">
    <button class="tbtn" data-h="1">1s</button>
    <button class="tbtn active" data-h="24">24s</button>
    <button class="tbtn" data-h="48">48s</button>
    <button class="tbtn" data-h="168">1 Hafta</button>
  </div>

  <div class="sep"></div>

  <!-- Sliders -->
  <div class="ctrl">
    <label>Radius</label>
    <input type="range" id="sRadius" min="1" max="50" value="18">
    <span id="vRadius">18</span>
  </div>
  <div class="ctrl">
    <label>Blur</label>
    <input type="range" id="sBlur" min="1" max="50" value="15">
    <span id="vBlur">15</span>
  </div>

  <div class="sep"></div>

  <!-- Kaynak -->
  <div class="ctrl">
    <label>Kaynak</label>
    <select class="src-sel" id="srcSel">
      <option value="emsc">EMSC</option>
      <option value="orfeus">ORFEUS</option>
      <option value="gfz">GFZ</option>
      <option value="usgs">USGS</option>
    </select>
  </div>

  <!-- EMSC Canlı Akış -->
  <div class="live-badge off" id="liveBadge">
    <span class="dot"></span>
    <span id="liveLabel">EMSC Canlı</span>
  </div>
  <div class="ctrl" style="font-size:.75rem;color:#555">
    <span>+<b id="liveCount" style="color:#34d399">0</b> yeni</span>
  </div>

  <div style="margin-left:auto" class="ctrl">
    <label style="color:#444">Yenileme:</label>
    <span id="countdown" style="color:#444;min-width:32px">300s</span>
  </div>
</div>

<!-- STATUS -->
<div class="sbar">
  <span id="statusTxt">Yükleniyor…</span>
  <span>Toplam: <b id="sCnt">—</b></span>
  <span>M≥3: <b id="sM3">—</b></span>
  <span>M≥4: <b id="sM4">—</b></span>
  <span>M≥5: <b id="sM5">—</b></span>
  <span>Maks: <b id="sMx">—</b></span>
  <span>Güncelleme: <b id="sUpd">—</b></span>
  <span style="margin-left:auto">
    <a href="https://deprem.afad.gov.tr/last-earthquakes.html" target="_blank">↗ AFAD</a> &nbsp;
    <a href="http://www.koeri.boun.edu.tr/sismo/2/tr/son-depremler/" target="_blank">↗ KANDİLLİ</a> &nbsp;
    <a href="https://www.emsc-csem.org/Earthquake_information/" target="_blank">↗ EMSC</a> &nbsp;
    <a href="https://deprem.comoglu.com" target="_blank">↗ deprem.comoglu</a>
  </span>
</div>

<script>
/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const TURKEY   = { minLat:33, maxLat:45, minLon:23, maxLon:48 };
const RAW_BASE = 'https://raw.githubusercontent.com/aliosmanoncel/fay-yolu-aricilik-veri-bankasi/main/data';
const FAY_URL  = `${RAW_BASE}/turkiye_diri_fay.geojson`;
const EQ_URL   = `${RAW_BASE}/turkey_eq.json`;   // GitHub Actions her saat günceller
const EMSC_WS  = 'wss://www.seismicportal.eu/standing_order/websocket';
const REFRESH  = 3600; // 1 saat — GitHub Actions ile senkron

/* ══════════════════════════════════════════
   HARİTA
══════════════════════════════════════════ */
const map = L.map('map', { center:[39,35], zoom:6 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
  { attribution:'© OpenStreetMap © CARTO', maxZoom:18 }).addTo(map);

const labelLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',
  { maxZoom:18, zIndex:700 }).addTo(map);

/* ══════════════════════════════════════════
   DİRİ FAY HATLARI
══════════════════════════════════════════ */
const fayColor = p => {
  const t = ((p&&(p.fault_type||p.type||p.FAY_TIPI||p.fay_tipi||''))+'').toLowerCase();
  if (t.includes('strike')||t.includes('doğrultu')) return '#f97316';
  if (t.includes('normal'))                         return '#06b6d4';
  if (t.includes('thrust')||t.includes('bindirme')) return '#ef4444';
  return '#666';
};

fetch(FAY_URL).then(r=>r.json()).then(gj=>{
  L.geoJSON(gj,{
    style: f=>({ color:fayColor(f.properties), weight:1.1, opacity:0.75 }),
    onEachFeature:(f,layer)=>{
      const p=f.properties||{};
      const name=p.name||p.NAME||p.FAY_ADI||p.fay_adi||'—';
      const type=p.fault_type||p.type||p.FAY_TIPI||p.fay_tipi||'—';
      const slip=p.slip_rate||p.SLIP_RATE||'—';
      layer.bindPopup(`<b style="color:#f97316">${name}</b><br>Tip: ${type}<br>Kayma: ${slip} cm/yıl`);
    }
  }).addTo(map);
}).catch(()=>{});

/* ══════════════════════════════════════════
   VERİ KAYNAKLARI (EMSC + USGS)
══════════════════════════════════════════ */
/* ══════════════════════════════════════════
   KAYNAK ZİNCİRİ
   EMSC: format=text (pipe-separated) — çalışan format
   USGS: format=geojson — yedek
══════════════════════════════════════════ */
function getSourceChain(hours) {
  const now = new Date(), s = new Date(now - hours*3600000);
  const fmt = d => d.toISOString().slice(0,19);
  const time = `&starttime=${fmt(s)}&endtime=${fmt(now)}`;

  return [
    {
      name: 'EMSC',
      fmt:  'text',
      url:  `https://www.seismicportal.eu/fdsnws/event/1/query?format=text`
           +`&minlat=${TURKEY.minLat}&maxlat=${TURKEY.maxLat}`
           +`&minlon=${TURKEY.minLon}&maxlon=${TURKEY.maxLon}`
           +`${time}&minmagnitude=1.0&limit=2000&orderby=time`
    },
    {
      name: 'USGS',
      fmt:  'geojson',
      url:  `https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson`
           +`&minlatitude=${TURKEY.minLat}&maxlatitude=${TURKEY.maxLat}`
           +`&minlongitude=${TURKEY.minLon}&maxlongitude=${TURKEY.maxLon}`
           +`${time}&minmagnitude=1.0&limit=2000&orderby=time`
    }
  ];
}

/* EMSC text formatı: # ile başlayan header satırları atla
   Sütun sırası: EventID|Time|Lat|Lon|Depth|Author|Catalog|Contributor|ContributorID|MagType|Magnitude|MagAuthor|EventLocationName
*/
function parseEMSCText(text) {
  return text.split('\n')
    .filter(l => l.trim() && !l.startsWith('#') && l.includes('|'))
    .map(l => {
      const c = l.split('|');
      if (c.length < 11) return null;
      const lat = parseFloat(c[2]), lon = parseFloat(c[3]);
      const dep = parseFloat(c[4]) || 0;
      const mag = parseFloat(c[10]);
      if (isNaN(lat)||isNaN(lon)||isNaN(mag)) return null;
      return { lat, lon, dep, mag, place: (c[12]||'').trim(), time: new Date(c[1].trim()) };
    }).filter(Boolean);
}

function parseGeoJSON(data) {
  return (data.features||[]).map(f=>{
    const [lon,lat,dep] = f.geometry.coordinates, p = f.properties;
    return { lat, lon, dep:dep||0, mag:parseFloat(p.mag||0), place:p.place||p.flynn_region||'', time:new Date(p.time||Date.now()) };
  }).filter(e=>!isNaN(e.mag)&&e.mag>0);
}

function parseFeatures(src, raw) {
  if (src.fmt === 'text') return parseEMSCText(typeof raw === 'string' ? raw : '');
  return parseGeoJSON(typeof raw === 'object' ? raw : {});
}

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let events      = [];        // mevcut deprem listesi
let liveEvents  = [];        // WS ile gelen yeni depremler
let heatLayer   = null;
let markLayer   = null;
let liveMarkers = L.layerGroup().addTo(map);
let hours       = 24;
let src         = 'emsc';
let radius      = 18, blur = 15;
let cntVal      = REFRESH, cntTimer = null;
let liveCount   = 0;

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function renderHeat(evList) {
  if (heatLayer)  { map.removeLayer(heatLayer);  heatLayer  = null; }
  if (markLayer)  { map.removeLayer(markLayer);  markLayer  = null; }
  if (!evList.length) return;

  const allMags = evList.map(e=>e.mag);
  const maxMag  = Math.max(...allMags, 3);

  const pts = evList.map(e=>[
    e.lat, e.lon,
    Math.max(0.05, Math.min(1, (e.mag-1)/(maxMag-1||1)))
  ]);

  heatLayer = L.heatLayer(pts,{
    radius, blur, maxZoom:12,
    gradient:{ 0:'#000080', 0.2:'#0000ff', 0.4:'#00ffff', 0.6:'#00ff00', 0.8:'#ffff00', 0.9:'#ff8800', 1:'#ff0000' }
  }).addTo(map);

  markLayer = L.layerGroup();
  evList.filter(e=>e.mag>=4).forEach(e=>{
    const col = e.mag>=5 ? '#ef4444' : '#f97316';
    L.circleMarker([e.lat,e.lon],{
      radius:Math.max(4,e.mag*2), color:col, fillColor:col, fillOpacity:.65, weight:1
    }).bindPopup(`<b style="color:${col}">M${e.mag.toFixed(1)}</b><br>${e.place}<br>Derinlik: ${e.dep.toFixed(0)} km<br>${e.time.toLocaleString('tr-TR')}`)
     .addTo(markLayer);
  });
  markLayer.addTo(map);
  labelLayer.bringToFront();
}

function updateStats(evList) {
  document.getElementById('sCnt').textContent = evList.length;
  document.getElementById('sM3').textContent  = evList.filter(e=>e.mag>=3).length;
  document.getElementById('sM4').textContent  = evList.filter(e=>e.mag>=4).length;
  document.getElementById('sM5').textContent  = evList.filter(e=>e.mag>=5).length;
  const mags = evList.map(e=>e.mag);
  document.getElementById('sMx').textContent  = mags.length ? 'M'+Math.max(...mags).toFixed(1) : '—';
  document.getElementById('sUpd').textContent = new Date().toLocaleTimeString('tr-TR');
}

function setStatus(msg, isErr) {
  const el = document.getElementById('statusTxt');
  el.innerHTML = isErr ? `<span class="err">${msg}</span>` : msg;
}

/* ══════════════════════════════════════════
   VERİ YÜKLEME (tarihsel)
══════════════════════════════════════════ */
async function loadData(sourceName, h) {
  const tag = h<24 ? h+'s' : h===168 ? '1 hafta' : h/24+'g';

  /* ── 1. GitHub raw (Actions tarafından saatlik güncellenir) ── */
  setStatus('GitHub veri deposu okunuyor…');
  try {
    const res  = await fetch(EQ_URL + '?_=' + Date.now()); // cache bypass
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    // Zaman penceresine göre filtrele
    const cutoff = new Date(Date.now() - h * 3600000);
    const all    = (json.events || []).map(e => ({
      lat  : e.lat,
      lon  : e.lon,
      dep  : e.dep  || 0,
      mag  : e.mag  || 0,
      place: e.place|| '',
      time : new Date(e.time)
    })).filter(e => e.time >= cutoff && e.mag > 0);

    if (all.length === 0) throw new Error('Seçili zaman penceresinde veri yok');

    events = all;
    const combined = [...events, ...liveEvents];
    renderHeat(combined);
    updateStats(combined);
    const gen = json.generated ? ` · Güncellendi: ${json.generated.slice(11,16)} UTC` : '';
    setStatus(`${combined.length} deprem · GitHub/EMSC · ${tag}${gen}`);
    return;
  } catch(e) {
    setStatus(`GitHub: ${e.message} — doğrudan EMSC deneniyor…`, true);
    await new Promise(r => setTimeout(r, 300));
  }

  /* ── 2. Doğrudan EMSC FDSN (yedek) ── */
  const chain = getSourceChain(h);
  for (const source of chain) {
    setStatus(`${source.name} deneniyor…`);
    try {
      const res    = await fetch(source.url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const raw    = source.fmt === 'text' ? await res.text() : await res.json();
      const parsed = parseFeatures(source, raw);
      if (parsed.length === 0) throw new Error('Boş yanıt');
      events = parsed;
      const combined = [...events, ...liveEvents];
      renderHeat(combined);
      updateStats(combined);
      setStatus(`${combined.length} deprem · ${source.name} (doğrudan) · ${tag}`);
      return;
    } catch(e) {
      setStatus(`${source.name}: ${e.message}`, true);
      await new Promise(r => setTimeout(r, 400));
    }
  }
  setStatus('Tüm kaynaklar yanıt vermedi.', true);
}

/* ══════════════════════════════════════════
   EMSC WEBSOCKET — CANLI AKIM
══════════════════════════════════════════ */
let ws = null;

function inTurkey(lat, lon) {
  return lat>=TURKEY.minLat && lat<=TURKEY.maxLat &&
         lon>=TURKEY.minLon && lon<=TURKEY.maxLon;
}

function setBadge(state) {  // 'on' | 'off' | 'retry'
  const b = document.getElementById('liveBadge');
  const l = document.getElementById('liveLabel');
  b.className = 'live-badge ' + (state==='on' ? 'on' : 'off');
  l.textContent = state==='on' ? 'EMSC Canlı ●' : state==='retry' ? 'Yeniden bağlanıyor…' : 'EMSC Canlı';
}

function connectWS() {
  if (ws) { try { ws.close(); } catch(e){} }
  setBadge('retry');
  ws = new WebSocket(EMSC_WS);

  ws.onopen = () => { setBadge('on'); };

  ws.onmessage = (msg) => {
    try {
      const d = JSON.parse(msg.data);
      if (!d || !d.data) return;
      const info = d.data;
      const lat  = parseFloat(info.lat||info.latitude||0);
      const lon  = parseFloat(info.lon||info.longitude||0);
      const mag  = parseFloat(info.mag||info.magnitude||0);
      if (!inTurkey(lat, lon) || isNaN(mag) || mag<=0) return;

      const ev = {
        lat, lon,
        dep:   parseFloat(info.depth||0),
        mag,
        place: info.flynn_region||info.region||'',
        time:  new Date(info.time||Date.now())
      };
      liveEvents.push(ev);
      liveCount++;
      document.getElementById('liveCount').textContent = liveCount;

      // yeni deprem noktasını haritaya ekle (flash)
      const col = mag>=5 ? '#ef4444' : mag>=4 ? '#f97316' : '#fbbf24';
      const m = L.circleMarker([lat,lon],{
        radius:Math.max(5,mag*2.2), color:col, fillColor:col, fillOpacity:.9, weight:2,
        className:'new-eq'
      }).bindPopup(`<b style="color:${col}">🔴 YENİ — M${mag.toFixed(1)}</b><br>${ev.place}<br>${ev.dep.toFixed(0)} km<br>${ev.time.toLocaleString('tr-TR')}`);
      m.addTo(liveMarkers).openPopup();

      // heat map'i de güncelle
      renderHeat([...events, ...liveEvents]);
      updateStats([...events, ...liveEvents]);
    } catch(e) {}
  };

  ws.onerror  = () => { setBadge('off'); };
  ws.onclose  = () => { setBadge('off'); setTimeout(connectWS, 10000); }; // 10sn sonra tekrar bağlan
}

/* ══════════════════════════════════════════
   SLIDER
══════════════════════════════════════════ */
function applySliders() {
  radius = +document.getElementById('sRadius').value;
  blur   = +document.getElementById('sBlur').value;
  document.getElementById('vRadius').textContent = radius;
  document.getElementById('vBlur').textContent   = blur;
  if (heatLayer) heatLayer.setOptions({ radius, blur });
}
document.getElementById('sRadius').addEventListener('input', applySliders);
document.getElementById('sBlur').addEventListener('input', applySliders);

/* ══════════════════════════════════════════
   BUTONLAR
══════════════════════════════════════════ */
document.querySelectorAll('.tbtn').forEach(b=>b.addEventListener('click',function(){
  document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');
  hours = +this.dataset.h;
  resetTimer(); loadData(src, hours);
}));

document.getElementById('srcSel').addEventListener('change',function(){
  src = this.value; resetTimer(); loadData(src, hours);
});

/* ══════════════════════════════════════════
   COUNTDOWN
══════════════════════════════════════════ */
function resetTimer() {
  if (cntTimer) clearInterval(cntTimer);
  cntVal = REFRESH;
  document.getElementById('countdown').textContent = cntVal+'s';
  cntTimer = setInterval(()=>{
    cntVal--;
    document.getElementById('countdown').textContent = cntVal+'s';
    if (cntVal<=0) { resetTimer(); loadData(src, hours); }
  }, 1000);
}

/* ══════════════════════════════════════════
   BAŞLAT
══════════════════════════════════════════ */
connectWS();
resetTimer();
loadData(src, hours);
</script>
</body>
</html>
